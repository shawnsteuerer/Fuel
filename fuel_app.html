<style>

.week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }

.week-day-cal { font-family: 'DM Serif Display', serif; font-size: 22px; color: #e8d5a3; line-height: 1; margin-bottom: 4px; }
.week-day-kcal { font-size: 9px; color: #444; }
.week-day-meals { margin-top: 12px; display: flex; flex-direction: column; gap: 5px; }
.week-meal-chip { font-size: 9px; color: #555; line-height: 1.3; padding: 4px 6px; background: #0a0a0a; border-radius: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ai-btn { display: flex; align-items: center; gap: 10px; background: #0e0e0e; border: 1px solid #2a2a2a; border-radius: 6px; padding: 14px 18px; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 12px; color: #aaa; transition: all 0.15s; width: 100%; margin-bottom: 16px; }
.ai-btn:hover { border-color: #e8d5a3; color: #e8d5a3; }
.ai-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.ai-result { background: #0c0c0c; border: 1px solid #1e1e1e; border-radius: 7px; padding: 20px; margin-top: 4px; }
.ai-result-hdr { font-family: 'DM Serif Display', serif; font-size: 18px; color: #e8d5a3; margin-bottom: 16px; }
.ai-streaming { color: #6a8a6a; font-size: 12px; line-height: 1.8; white-space: pre-wrap; }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #333; border-top-color: #e8d5a3; border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; min-height: 420px; text-align: center; gap: 10px; }

.empty-title { font-family: 'DM Serif Display', serif; font-size: 26px; color: #2a2a2a; }
.empty-sub { color: #2a2a2a; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; }

</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef, useEffect } = React;

const ACTIVITY = {
  sedentary:  { label: "Sedentary",         desc: "little/no exercise",  mult: 1.2   },
  light:      { label: "Lightly active",    desc: "1–3 days/week",       mult: 1.375 },
  moderate:   { label: "Moderately active", desc: "3–5 days/week",       mult: 1.55  },
  active:     { label: "Very active",       desc: "6–7 days/week",       mult: 1.725 },
  athlete:    { label: "Athlete",           desc: "2× daily training",   mult: 1.9   },
};

const GOALS = {
  aggressive_cut: { label: "Aggressive Cut", cal: -700, proteinPerLb: 1.0,  fatRatio: 0.35, carbRatio: 0.65 },
  cut:            { label: "Cut",            cal: -500, proteinPerLb: 1.0,  fatRatio: 0.35, carbRatio: 0.65 },
  maintain:       { label: "Maintain",       cal:    0, proteinPerLb: 0.8,  fatRatio: 0.35, carbRatio: 0.65 },
  lean_bulk:      { label: "Lean Bulk",      cal:  300, proteinPerLb: 0.85, fatRatio: 0.30, carbRatio: 0.70 },
  bulk:           { label: "Bulk",           cal:  500, proteinPerLb: 0.8,  fatRatio: 0.28, carbRatio: 0.72 },
};

const DIETS = ["None","Vegetarian","Vegan","Pescatarian","Keto","Paleo","Gluten-Free","Dairy-Free","Halal","Kosher"];
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const DAY_VARIANTS = [
  { theme: "High Protein" }, { theme: "Balanced" }, { theme: "Higher Carb" },
  { theme: "High Protein" }, { theme: "Balanced" }, { theme: "Recovery" }, { theme: "Flex Day" },
];

const STATIC_PLANS = {
  cut: [
    { name: "Breakfast", desc: "Greek yogurt parfait w/ berries & granola",         baseCals: 280 },
    { name: "Lunch",     desc: "Grilled chicken salad w/ lemon vinaigrette",         baseCals: 420 },
    { name: "Snack",     desc: "Cottage cheese & sliced cucumber",                   baseCals: 130 },
    { name: "Dinner",    desc: "Baked cod w/ roasted broccoli & bell peppers",       baseCals: 390 },
    { name: "Snack",     desc: "Casein protein shake",                               baseCals: 120 },
  ],
  maintain: [
    { name: "Breakfast", desc: "Avocado toast, 2 eggs, everything bagel seasoning",  baseCals: 450 },
    { name: "Lunch",     desc: "Quinoa grain bowl w/ chickpeas & tahini",            baseCals: 560 },
    { name: "Snack",     desc: "1oz trail mix",                                      baseCals: 170 },
    { name: "Dinner",    desc: "6oz salmon, brown rice, asparagus, lemon butter",    baseCals: 620 },
    { name: "Snack",     desc: "Greek yogurt with honey",                            baseCals: 140 },
  ],
  bulk: [
    { name: "Breakfast", desc: "Oatmeal w/ protein powder, whole milk & banana",     baseCals: 780 },
    { name: "Lunch",     desc: "Ground beef burrito bowl w/ rice, beans & guac",     baseCals: 950 },
    { name: "Snack",     desc: "Mass gainer shake w/ oats & frozen banana",          baseCals: 580 },
    { name: "Dinner",    desc: "8oz sirloin, baked potato, broccoli",                baseCals: 820 },
    { name: "Snack",     desc: "PB & banana on whole wheat toast",                   baseCals: 450 },
  ],
};

function getBase(goal) {
  if (goal.includes("cut")) return STATIC_PLANS.cut;
  if (goal.includes("bulk")) return STATIC_PLANS.bulk;
  return STATIC_PLANS.maintain;
}

function buildDayMeals(targetCals, goal) {
  const base = getBase(goal);
  const rawTotal = base.reduce((s,m) => s + m.baseCals, 0);
  const scale = targetCals / rawTotal;
  return base.map(m => ({ ...m, cals: Math.round(m.baseCals * scale) }));
}

function buildWeek(results, goal) {
  const base = getBase(goal);
  const rawTotal = base.reduce((s,m) => s + m.baseCals, 0);
  return DAYS.map((day, i) => {
    const calAdjust = results.calories + (i === 5 || i === 6 ? 100 : 0);
    const scale = calAdjust / rawTotal;
    const meals = base.slice(0, 3).map(m => ({ ...m, cals: Math.round(m.baseCals * scale) }));
    return { day, calories: calAdjust, theme: DAY_VARIANTS[i].theme, meals };
  });
}

// Step calorie burn: ~0.045 cal/step adjusted for bodyweight
function stepCalories(steps, weightLbs) {
  if (!steps || steps <= 0) return 0;
  const base = steps * 0.045;
  const bwFactor = weightLbs / 155; // normalized to 155lb baseline
  return Math.round(base * bwFactor);
}

// Menstrual cycle calorie adjustments by phase
const CYCLE_PHASES = {
  none:        { label: "N/A",           calAdj: 0,    note: "" },
  follicular:  { label: "Follicular",    calAdj: 0,    note: "Day 1–13. Normal calorie needs. Good time for higher intensity training." },
  ovulation:   { label: "Ovulation",     calAdj: 100,  note: "Day 14. Slight energy increase. Peak strength and performance window." },
  luteal:      { label: "Luteal",        calAdj: 150,  note: "Day 15–28. Metabolic rate rises ~150 kcal. Cravings are normal — plan for them." },
  menstrual:   { label: "Menstrual",     calAdj: -50,  note: "Day 1–5. Slightly lower needs. Prioritize iron-rich foods and hydration." },
};

function calcTargets({ age, weight, height, sex, activity, goal, unit, steps, cyclePhase }) {
  let w = parseFloat(weight), h = parseFloat(height), a = parseInt(age);
  if (!w || !h || !a) return null;
  if (unit === "imperial") { w = w * 0.453592; h = h * 2.54; }
  const bmr = sex === "male" ? 10*w + 6.25*h - 5*a + 5 : 10*w + 6.25*h - 5*a - 161;
  const baseTdee = Math.round(bmr * ACTIVITY[activity].mult);
  const wLbs = unit === "imperial" ? parseFloat(weight) : w * 2.20462;

  // Add step-based calorie burn on top of activity multiplier
  const stepCals = stepCalories(parseInt(steps) || 0, wLbs);

  // Cycle phase adjustment
  const cycleAdj = sex === "female" && cyclePhase ? (CYCLE_PHASES[cyclePhase]?.calAdj || 0) : 0;

  const tdee = baseTdee + stepCals;
  const adj = GOALS[goal];
  const calories = Math.round(tdee + adj.cal + cycleAdj);

  // Protein: strictly bodyweight-based (0.8g/lb maintain/bulk, 1g/lb cut)
  const protein = Math.round(wLbs * adj.proteinPerLb);
  const proteinCals = protein * 4;
  const remainingCals = calories - proteinCals;
  const fat   = Math.round((remainingCals * adj.fatRatio) / 9);
  const carbs = Math.round((remainingCals * adj.carbRatio) / 4);
  const fiber = Math.round(calories / 1000 * 14);

  // Protein distribution across meals (30-40g per meal maximizes MPS)
  const meals = 5;
  const proteinPerMeal = Math.round(protein / meals);

  const actualAdj = { ...adj, protein: (protein*4)/calories, carbs: (carbs*4)/calories, fat: (fat*9)/calories };
  return {
    calories, protein, carbs, fat, fiber, tdee, baseTdee, stepCals, cycleAdj,
    adj: actualAdj, water: Math.round(w * 0.033 * 10) / 10,
    proteinPerMeal, cycleNote: CYCLE_PHASES[cyclePhase]?.note || ""
  };
}

async function streamAI(prompt, onChunk, onDone, onError) {
  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        stream: true,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();
      for (const line of lines) {
        if (line.startsWith("data: ")) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.type === "content_block_delta" && data.delta?.text) onChunk(data.delta.text);
          } catch {}
        }
      }
    }
    onDone();
  } catch(e) { onError(e); }
}

function App() {
  const [form, setForm] = useState({
    age: "", weight: "", height: "", sex: "male",
    activity: "moderate", goal: "maintain", unit: "metric", diet: "None",
    foodLikes: "", foodAvoid: "",
    steps: "", cyclePhase: "none", ifWindow: "none"
  });
  const [results, setResults] = useState(null);
  const [view, setView] = useState("day");
  const [activeDay, setActiveDay] = useState(0);
  const [aiOutput, setAiOutput] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [aiGenerated, setAiGenerated] = useState(false);
  const [dayAiOutput, setDayAiOutput] = useState("");
  const [dayAiLoading, setDayAiLoading] = useState(false);
  const prevResultsRef = useRef(null);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const hasPreferences = form.foodLikes.trim() || form.foodAvoid.trim();

  const calculate = () => {
    const r = calcTargets(form);
    if (r) { setResults(r); setAiOutput(""); setAiGenerated(false); setDayAiOutput(""); }
  };

  function buildPrompt(results, form, detailed) {
    const dietNote = form.diet !== "None" ? `Dietary preference: ${form.diet}.` : "";
    const likesNote = form.foodLikes.trim() ? `Foods the person enjoys: ${form.foodLikes}.` : "";
    const avoidNote = form.foodAvoid.trim() ? `Foods to avoid completely: ${form.foodAvoid}.` : "";
    const goalLabel = GOALS[form.goal].label;
    const ifNote = form.ifWindow === "16_8" ? "Meal timing: 16:8 IF — structure all meals within an 8-hour eating window (e.g. 12pm–8pm)." :
                   form.ifWindow === "18_6" ? "Meal timing: 18:6 IF — structure all meals within a 6-hour eating window (e.g. 1pm–7pm)." :
                   form.ifWindow === "omad" ? "Meal timing: OMAD — provide ONE large meal hitting all daily targets." : "";
    const proteinMealNote = `Aim for ~${results.proteinPerMeal}g protein per meal to maximize muscle protein synthesis.`;
    return `You are a registered dietitian creating a personalized meal plan.
Target: ${results.calories} kcal/day | Protein: ${results.protein}g | Carbs: ${results.carbs}g | Fat: ${results.fat}g | Fiber: ${results.fiber}g
Goal: ${goalLabel}
${dietNote} ${likesNote} ${avoidNote} ${ifNote}
${proteinMealNote}
Create ONE full day of eating ${form.ifWindow === "omad" ? "(1 large meal)" : form.ifWindow !== "none" ? "(3-4 meals within the eating window)" : "(5 meals: Breakfast, Morning Snack, Lunch, Afternoon Snack, Dinner)"} that hits these targets.
${likesNote ? "Build meals primarily around the foods the person enjoys. " : ""}${avoidNote ? "Strictly avoid listed foods. " : ""}
${detailed ? "For each meal include: name, time, ingredients with portions, calories, and why it fits the goal." : "For each meal show: name, time, ingredients with portions, calories."}
End with a Day Total. Plain text only, no markdown symbols.`;
  }

  const generateDayAiMeals = useCallback(() => {
    if (!results) return;
    setDayAiLoading(true);
    setDayAiOutput("");
    streamAI(
      buildPrompt(results, form, false),
      chunk => setDayAiOutput(prev => prev + chunk),
      () => setDayAiLoading(false),
      () => { setDayAiOutput("Error generating. Please try again."); setDayAiLoading(false); }
    );
  }, [results, form]);

  const generateAiMeals = useCallback(() => {
    if (!results) return;
    setAiLoading(true);
    setAiOutput("");
    setAiGenerated(false);
    streamAI(
      buildPrompt(results, form, true),
      chunk => setAiOutput(prev => prev + chunk),
      () => { setAiLoading(false); setAiGenerated(true); },
      () => { setAiOutput("Error generating. Please try again."); setAiLoading(false); }
    );
  }, [results, form]);

  useEffect(() => {
    if (results && hasPreferences && results !== prevResultsRef.current) {
      prevResultsRef.current = results;
      generateDayAiMeals();
    }
  }, [results, hasPreferences, generateDayAiMeals]);

  const weekDays = results ? buildWeek(results, form.goal) : [];
  const dayMeals = results ? buildDayMeals(results.calories, form.goal) : [];
  const wl = form.unit === "metric" ? "kg" : "lbs";
  const hl = form.unit === "metric" ? "cm" : "in";

  return (
    <div className="app">
      <div className="header">
        <div>
          <div className="logo">Fuel</div>
          <div className="logo-sub">Precision nutrition planning</div>
        </div>
        {results && (
          <div style={{ fontSize:11, color:"#444", textAlign:"right" }}>
            <div style={{ color:"#666" }}>{GOALS[form.goal].label}</div>
            <div>{results.calories.toLocaleString()} kcal · {results.protein}P · {results.carbs}C · {results.fat}F</div>
          </div>
        )}
      </div>

      <div className="main">
        <aside className="sidebar">
          <div className="sec-label">Units & Basics</div>
          <div className="rb-group cols2" style={{ marginBottom:14 }}>
            {["metric","imperial"].map(u => (
              <div key={u} className={`rb ${form.unit===u?"on":""}`} onClick={() => set("unit",u)}>
                {u==="metric"?"Metric":"Imperial"}
              </div>
            ))}
          </div>
          <div className="rb-group cols2" style={{ marginBottom:14 }}>
            {["male","female"].map(s => (
              <div key={s} className={`rb ${form.sex===s?"on":""}`} onClick={() => set("sex",s)}>
                {s[0].toUpperCase()+s.slice(1)}
              </div>
            ))}
          </div>
          <div className="field">
            <label>Age</label>
            <input type="number" placeholder="25" value={form.age} onChange={e=>set("age",e.target.value)} />
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <div className="field">
              <label>Weight ({wl})</label>
              <input type="number" placeholder={form.unit==="metric"?"75":"165"} value={form.weight} onChange={e=>set("weight",e.target.value)} />
            </div>
            <div className="field">
              <label>Height ({hl})</label>
              <input type="number" placeholder={form.unit==="metric"?"175":"69"} value={form.height} onChange={e=>set("height",e.target.value)} />
            </div>
          </div>

          <hr className="divider" />
          <div className="sec-label">Activity Level</div>
          {Object.entries(ACTIVITY).map(([k,v]) => (
            <div key={k} className="radio-row" onClick={() => set("activity",k)}>
              <div className="radio-dot" style={{ border:`2px solid ${form.activity===k?"#e8d5a3":"#2a2a2a"}`, background:form.activity===k?"#e8d5a3":"transparent" }} />
              <div>
                <div className="radio-label" style={{ color:form.activity===k?"#e8d5a3":"#777" }}>{v.label}</div>
                <div className="radio-desc">{v.desc}</div>
              </div>
            </div>
          ))}

          <hr className="divider" />
          <div className="sec-label">Goal</div>
          <div className="rb-group" style={{ marginBottom:0 }}>
            {Object.entries(GOALS).map(([k,v]) => (
              <div key={k} className={`rb ${form.goal===k?"on":""}`} style={{ textAlign:"left", padding:"9px 12px" }} onClick={() => set("goal",k)}>
                {v.label}
                <span style={{ float:"right", color:form.goal===k?"#887a4a":"#333", fontSize:10 }}>
                  {v.cal>0?"+":""}{v.cal!==0?v.cal+" kcal":"TDEE"}
                </span>
              </div>
            ))}
          </div>

          <hr className="divider" />
          <div className="sec-label">Dietary Preference</div>
          <div className="diet-chips">
            {DIETS.map(d => (
              <div key={d} className={`diet-chip ${form.diet===d?"on":""}`} onClick={() => set("diet",d)}>{d}</div>
            ))}
          </div>

          <hr className="divider" />
          <div className="sec-label">Daily Steps</div>
          <div className="field">
            <label>Average steps per day</label>
            <input type="number" placeholder="e.g. 8000" value={form.steps} onChange={e=>set("steps",e.target.value)} />
          </div>
          <div style={{ fontSize:10, color:"#333", lineHeight:1.6, marginBottom:8 }}>
            Steps add calories on top of your activity level for a more accurate target.
          </div>

          <hr className="divider" />
          <div className="sec-label">Meal Timing</div>
          <div className="rb-group" style={{ marginBottom:0 }}>
            {[
              ["none",   "Standard (3 meals + 2 snacks)"],
              ["16_8",   "16:8 Intermittent Fasting"],
              ["18_6",   "18:6 Intermittent Fasting"],
              ["omad",   "OMAD (One Meal a Day)"],
            ].map(([k,l]) => (
              <div key={k} className={`rb ${form.ifWindow===k?"on":""}`}
                style={{ textAlign:"left", padding:"9px 12px" }}
                onClick={() => set("ifWindow",k)}>
                {l}
              </div>
            ))}
          </div>

          {form.sex === "female" && (
            <>
              <hr className="divider" />
              <div className="sec-label">Cycle Phase</div>
              <div style={{ fontSize:10, color:"#333", lineHeight:1.6, marginBottom:12 }}>
                Your metabolic rate shifts across your cycle. Select your current phase for a more accurate calorie target.
              </div>
              <div className="rb-group" style={{ marginBottom:0 }}>
                {Object.entries({none:"N/A", follicular:"Follicular (Day 1–13)", ovulation:"Ovulation (Day 14)", luteal:"Luteal (Day 15–28)", menstrual:"Menstrual (Day 1–5)"}).map(([k,l]) => (
                  <div key={k} className={`rb ${form.cyclePhase===k?"on":""}`}
                    style={{ textAlign:"left", padding:"9px 12px" }}
                    onClick={() => set("cyclePhase",k)}>
                    {l}
                  </div>
                ))}
              </div>
            </>
          )}

          <hr className="divider" />
          <div className="sec-label">Food Preferences</div>
          <div className="field">
            <label>Foods I enjoy</label>
            <input type="text" placeholder="e.g. chicken, rice, eggs, Greek yogurt" value={form.foodLikes} onChange={e=>set("foodLikes",e.target.value)} />
          </div>
          <div className="field">
            <label>Foods I avoid</label>
            <input type="text" placeholder="e.g. fish, broccoli, dairy" value={form.foodAvoid} onChange={e=>set("foodAvoid",e.target.value)} />
          </div>
          <div style={{ fontSize:10, color:"#333", marginBottom:16, lineHeight:1.6 }}>
            Used by the AI meal generator to personalise your plan.
          </div>

          <hr className="divider" />
          <button className="calc-btn" onClick={calculate} disabled={!form.age || !form.weight || !form.height}>
            Calculate Targets
          </button>
        </aside>

        <main className="content">
          {!results ? (
            <div className="empty">
              <div className="empty-icon">◎</div>
              <div className="empty-title">Enter your profile</div>
              <div className="empty-sub">Fill in the sidebar and calculate</div>
            </div>
          ) : (
            <>
              <div className="results-top">
                <div>
                  <div className="cal-number">{results.calories.toLocaleString()}</div>
                  <div className="cal-label">kcal / day</div>
                </div>
                <div style={{ paddingBottom:8 }}>
                  <div style={{ fontSize:11, color:"#555", marginBottom:4 }}>TDEE {results.tdee.toLocaleString()} kcal</div>
                  <div style={{ fontSize:11, color:"#444" }}>
                    {GOALS[form.goal].cal!==0 ? `${GOALS[form.goal].cal>0?"+":""}${GOALS[form.goal].cal} kcal adjustment` : "At maintenance"}
                  </div>
                </div>
              </div>

              <div className="macro-bar">
                <div className="macro-bar-seg" style={{ width:`${Math.round(results.adj.protein*100)}%`, background:"#c9a96e" }} />
                <div className="macro-bar-seg" style={{ width:`${Math.round(results.adj.carbs*100)}%`, background:"#8eb8a3" }} />
                <div className="macro-bar-seg" style={{ width:`${Math.round(results.adj.fat*100)}%`, background:"#a38eb8" }} />
              </div>

              <div className="macro-grid">
                <div className="macro-card mc-p">
                  <div className="mlabel">Protein</div>
                  <div className="mval">{results.protein}g</div>
                  <div className="msub">{Math.round(results.adj.protein*100)}% of cals</div>
                </div>
                <div className="macro-card mc-c">
                  <div className="mlabel">Carbs</div>
                  <div className="mval">{results.carbs}g</div>
                  <div className="msub">{Math.round(results.adj.carbs*100)}% of cals</div>
                </div>
                <div className="macro-card mc-f">
                  <div className="mlabel">Fat</div>
                  <div className="mval">{results.fat}g</div>
                  <div className="msub">{Math.round(results.adj.fat*100)}% of cals</div>
                </div>
                <div className="macro-card mc-cal">
                  <div className="mlabel">Fiber</div>
                  <div className="mval">{results.fiber}g</div>
                  <div className="msub">~14g per 1000 kcal</div>
                </div>
              </div>

              <div className="micro-grid">
                {[
                  { label:"Water", val:`${results.water}L`, sub:"0.033L per kg" },
                  { label:"Sodium", val:"<2,300mg", sub:"daily upper limit" },
                  { label:"Potassium", val:"3,400mg+", sub:"supports hydration" },
                  { label:"Calcium", val:"1,000mg", sub:"bone & muscle" },
                  { label:"Iron", val:form.sex==="female"?"18mg":"8mg", sub:"oxygen transport" },
                  { label:"Vitamin D", val:"600 IU", sub:"immunity & hormones" },
                  { label:"Magnesium", val:form.sex==="male"?"420mg":"320mg", sub:"muscle recovery" },
                  { label:"Zinc", val:form.sex==="male"?"11mg":"8mg", sub:"immune & testosterone" },
                  { label:"Omega-3", val:"1.6g", sub:"anti-inflammatory" },
                ].map(m => (
                  <div key={m.label} className="micro-card">
                    <div className="mlabel">{m.label}</div>
                    <div className="mval">{m.val}</div>
                    <div className="msub">{m.sub}</div>
                  </div>
                ))}
              </div>

              <div className="insight">
                <strong>Why these numbers?</strong> BMR calculated via Mifflin-St Jeor. Base TDEE = <strong>{results.baseTdee.toLocaleString()} kcal</strong> with your activity level.
                {results.stepCals > 0 && <span> Steps add <strong>+{results.stepCals} kcal</strong> for a total TDEE of <strong>{results.tdee.toLocaleString()} kcal</strong>.</span>}
                {results.cycleAdj !== 0 && <span> Cycle phase adjustment: <strong>{results.cycleAdj > 0 ? "+" : ""}{results.cycleAdj} kcal</strong>.</span>}
                {" "}Your {GOALS[form.goal].label.toLowerCase()} goal brings you to <strong>{results.calories.toLocaleString()} kcal/day</strong>.
                {form.goal.includes("cut") && " Protein at 1g/lb bodyweight to protect lean muscle during a deficit."}
                {form.goal.includes("bulk") && " Protein at 0.8g/lb bodyweight to support muscle growth."}
                {form.goal==="maintain" && " Protein at 0.8g/lb bodyweight — standard recommendation for muscle maintenance."}
                {" Protein is calculated from your bodyweight, not a percentage — the method used by sports dietitians."}
                {" Aim for roughly "}<strong>{results.proteinPerMeal}g protein per meal</strong>{" across 5 meals to maximize muscle protein synthesis."}
                {results.cycleNote && <span style={{display:"block", marginTop:8, color:"#7a9a7a"}}>{results.cycleNote}</span>}
                {form.diet!=="None" && ` Meals tailored for a ${form.diet} diet.`}
              </div>

              {form.ifWindow !== "none" && (
                <div style={{ background:"#0a0a10", border:"1px solid #1a1a2a", borderRadius:5, padding:"12px 18px", marginBottom:20, fontSize:11, color:"#7a7aaa", lineHeight:1.7 }}>
                  <strong style={{color:"#9a9acc"}}>Meal timing: </strong>
                  {form.ifWindow === "16_8" && "16:8 — Eat within an 8-hour window (e.g. 12pm–8pm). Fast for 16 hours. All meals fit within this window."}
                  {form.ifWindow === "18_6" && "18:6 — Eat within a 6-hour window (e.g. 1pm–7pm). Fast for 18 hours. Condense meals accordingly."}
                  {form.ifWindow === "omad" && "OMAD — One large meal per day. Hit your full calorie and macro targets in a single sitting. Ensure adequate protein."}
                </div>
              )}

              <div className="view-tabs">
                {[["day","Day View"],["week","Weekly Plan"],["ai","AI Meal Generator"]].map(([k,l]) => (
                  <div key={k} className={`view-tab ${view===k?"on":""}`} onClick={() => setView(k)}>{l}</div>
                ))}
              </div>

              {view==="day" && (
                <>
                  {hasPreferences ? (
                    <div className="ai-result">
                      <div style={{ marginBottom:16 }}>
                        <div className="ai-result-hdr">Your Personalised Day Plan</div>
                        <div style={{ fontSize:11, color:"#555", marginBottom:20 }}>
                          {form.foodLikes && <span style={{color:"#6a8a6a"}}>Likes: {form.foodLikes}</span>}
                          {form.foodLikes && form.foodAvoid && " · "}
                          {form.foodAvoid && <span style={{color:"#8a6a6a"}}>Avoids: {form.foodAvoid}</span>}
                        </div>
                        <div style={{ background:"#0a0f0a", border:"1px solid #1a2a1a", borderRadius:6, padding:"16px 20px", fontSize:12, color:"#3a5a3a", lineHeight:1.9, marginBottom:16, fontStyle:"italic" }}>
                          Breakfast · Scrambled eggs with avocado on sourdough — 420 kcal<br/>
                          Morning Snack · Greek yogurt with honey and fruit — 180 kcal<br/>
                          Lunch · Ground beef rice bowl with sweet potato — 580 kcal<br/>
                          Afternoon Snack · Apple with almond butter — 200 kcal<br/>
                          Dinner · Baked fish with roasted vegetables — 480 kcal
                        </div>
                        <div style={{ background:"#080808", border:"1px solid #1a1410", borderRadius:6, padding:"20px 24px", textAlign:"center" }}>
                          <div style={{ fontSize:13, color:"#888", marginBottom:8 }}>🔒 Unlock your real personalized plan</div>
                          <div style={{ fontSize:11, color:"#444", marginBottom:16, lineHeight:1.6 }}>
                            Pro generates a meal plan built around {form.foodLikes ? form.foodLikes.split(",")[0].trim() : "your foods"}, {form.foodAvoid ? `avoiding ${form.foodAvoid.split(",")[0].trim()}` : "your preferences"}, and your exact {results.calories} kcal target.
                          </div>
                          <a href="https://flourishing-cucurucho-bb3dfb.netlify.app/fuel_pricing" target="_blank"
                            style={{ display:"inline-block", background:"#e8d5a3", color:"#080808", padding:"12px 32px", borderRadius:3, fontSize:11, letterSpacing:2, textTransform:"uppercase", textDecoration:"none", fontFamily:"'DM Mono',monospace", fontWeight:500 }}>
                            Upgrade to Pro — $7.99/mo
                          </a>
                          <div style={{ fontSize:10, color:"#333", marginTop:10, letterSpacing:1 }}>Cancel anytime</div>
                        </div>
                      </div>
                    </div>
                  ) : (
                    <>
                      <div className="day-tabs">
                        {DAY_VARIANTS.map((d,i) => (
                          <div key={i} className={`day-tab ${activeDay===i?"on":""}`} onClick={()=>setActiveDay(i)}>
                            {DAYS[i]} · {d.theme}
                          </div>
                        ))}
                      </div>
                      <div className="meal-card">
                        <div className="meal-card-hdr">
                          <div className="meal-card-title">{DAYS[activeDay]} — {DAY_VARIANTS[activeDay].theme}</div>
                          <div className="meal-card-total">Total: <span>{results.calories} kcal</span></div>
                        </div>
                        {dayMeals.map((m,i) => (
                          <div key={i} className="meal-row">
                            <div className="meal-time">{m.name}</div>
                            <div className="meal-name">{m.desc}</div>
                            <div className="meal-cals">{m.cals} kcal</div>
                          </div>
                        ))}
                      </div>
                      <div style={{ fontSize:10, color:"#333", marginTop:8 }}>
                        Tip: Add foods you enjoy in the sidebar to get a personalised plan.
                      </div>
                    </>
                  )}
                </>
              )}

              {view==="week" && (
                <>
                  <div style={{ fontSize:11, color:"#444", marginBottom:16 }}>
                    Weekend calories are slightly higher (+100 kcal) to allow for flexibility.
                  </div>
                  <div className="week-grid">
                    {weekDays.map((d,i) => (
                      <div key={i} className="week-day">
                        <div className="week-day-name">{d.day}</div>
                        <div className="week-day-cal">{d.calories.toLocaleString()}</div>
                        <div className="week-day-kcal">kcal · {d.theme}</div>
                        <div className="week-day-meals">
                          {d.meals.map((m,j) => (
                            <div key={j} className="week-meal-chip">{m.desc}</div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={{ fontSize:10, color:"#333", marginTop:16, display:"flex", justifyContent:"space-between" }}>
                    <span>Weekly total: {weekDays.reduce((s,d)=>s+d.calories,0).toLocaleString()} kcal</span>
                    <span>Weekly avg: {Math.round(weekDays.reduce((s,d)=>s+d.calories,0)/7).toLocaleString()} kcal/day</span>
                  </div>
                </>
              )}

              {view==="ai" && (
                <div>
                  {/* Pro upsell - AI generator paywall */}
                  <div style={{
                    background: "linear-gradient(135deg, #0f0f0a 0%, #1a1608 100%)",
                    border: "1px solid #2a2410",
                    borderRadius: 8,
                    padding: 40,
                    textAlign: "center",
                    marginBottom: 20
                  }}>
                    <div style={{ fontSize: 36, marginBottom: 16 }}>✦</div>
                    <div style={{
                      fontFamily: "'DM Serif Display', serif",
                      fontSize: 26,
                      color: "#e8d5a3",
                      marginBottom: 10,
                      letterSpacing: -0.5
                    }}>AI Meal Generator</div>
                    <div style={{ fontSize: 12, color: "#666", lineHeight: 1.7, marginBottom: 28, maxWidth: 380, margin: "0 auto 28px" }}>
                      Get a completely personalized day of eating built around your exact calorie targets, macros, and food preferences. Every generation is unique.
                    </div>

                    <div style={{ display: "flex", flexDirection: "column", gap: 10, maxWidth: 320, margin: "0 auto 28px" }}>
                      {["Unlimited AI meal generation", "Meals built around your food preferences", "Respects your dietary restrictions", "New plan every time you generate"].map(f => (
                        <div key={f} style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 12, color: "#8eb8a3" }}>
                          <span style={{ color: "#8eb8a3", fontSize: 14 }}>✓</span> {f}
                        </div>
                      ))}
                    </div>

                    <a
                      href="https://flourishing-cucurucho-bb3dfb.netlify.app/fuel_pricing"
                      target="_blank"
                      style={{
                        display: "inline-block",
                        background: "#e8d5a3",
                        color: "#080808",
                        padding: "14px 40px",
                        borderRadius: 3,
                        fontSize: 12,
                        letterSpacing: 2,
                        textTransform: "uppercase",
                        textDecoration: "none",
                        fontFamily: "'DM Mono', monospace",
                        fontWeight: 500,
                        transition: "opacity 0.15s",
                        marginBottom: 12,
                        display: "block",
                        maxWidth: 280,
                        margin: "0 auto 12px"
                      }}
                      onMouseOver={e => e.target.style.opacity = 0.85}
                      onMouseOut={e => e.target.style.opacity = 1}
                    >
                      Upgrade to Pro — $7.99/mo
                    </a>
                    <div style={{ fontSize: 10, color: "#333", letterSpacing: 1 }}>
                      Cancel anytime · No commitment
                    </div>
                  </div>

                  <div style={{ background: "#0c0c0c", border: "1px solid #161616", borderRadius: 7, padding: 20 }}>
                    <div style={{ fontSize: 10, color: "#333", letterSpacing: 3, textTransform: "uppercase", marginBottom: 14 }}>Preview — what you'll get</div>
                    <div style={{ fontSize: 12, color: "#3a4a3a", lineHeight: 1.9, fontStyle: "italic" }}>
                      Breakfast · Scrambled eggs with avocado on sourdough toast — 420 kcal<br/>
                      Morning Snack · Greek yogurt with honey and mixed berries — 180 kcal<br/>
                      Lunch · Ground beef rice bowl with sweet potato and greens — 580 kcal<br/>
                      Afternoon Snack · Apple slices with almond butter — 200 kcal<br/>
                      Dinner · Baked salmon with roasted vegetables — 480 kcal<br/>
                      <span style={{ color: "#555" }}>Day Total: {results.calories} kcal · {results.protein}g protein</span>
                    </div>
                    <div style={{ marginTop: 14, padding: "10px 14px", background: "#080808", borderRadius: 4, fontSize: 10, color: "#2a2a2a", textAlign: "center" }}>
                      🔒 Upgrade to Pro to generate your real personalized plan
                    </div>
                  </div>
                </div>
              )}
            </>
          )}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
