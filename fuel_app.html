// ─── USDA Search ───────────────────────────────────────────────────────────────
async function searchUSDA(query) {
  try {
    const r = await fetch(
      `https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(query)}&pageSize=5&api_key=${USDA_KEY}&dataType=Branded,Foundation,SR%20Legacy`
    );
    const d = await r.json();
    return (d.foods || []).slice(0, 3).map(f => {
      const n = {};
      (f.foodNutrients || []).forEach(x => {
        if (x.nutrientName?.includes("Energy")) n.kcal = Math.round(x.value || 0);
        if (x.nutrientName?.includes("Protein")) n.protein = +(x.value || 0).toFixed(1);
        if (x.nutrientName?.includes("Carbohydrate")) n.carbs = +(x.value || 0).toFixed(1);
        if (x.nutrientName?.includes("Total lipid")) n.fat = +(x.value || 0).toFixed(1);
      });
      return {
        id: f.fdcId,
        name: f.description,
        brand: f.brandOwner || f.brandName || null,
        serving: f.servingSize ? `${f.servingSize}${f.servingSizeUnit || "g"}` : "100g",
        ...n,
      };
    });
  } catch { return []; }
}

  organic:       "organic",
  grassfed:      "grass fed grass-fed",
  pasture:       "pasture raised pasture-raised",
  wildcaught:    "wild caught wild-caught",
  nongmo:        "non-gmo non gmo",

const GROCERY_STORES = {
  none:       { label: "No preference",    brand: null },
  wholefoods: { label: "Whole Foods",      brand: "365 whole foods market" },
  traderjoes: { label: "Trader Joe's",     brand: "trader joes" },

  sprouts:    { label: "Sprouts",          brand: "sprouts" },
  aldi:       { label: "ALDI",             brand: "aldi" },
};

function buildSearchQuery(food, qualities, store) {
  const tags = Object.entries(qualities)
    .filter(([, v]) => v)
    .map(([k]) => QUALITY_KEYWORDS[k].split(" ")[0])
    .join(" ");
  const storeBrand = store && GROCERY_STORES[store]?.brand;
  const parts = [storeBrand, tags, food].filter(Boolean);
  return parts.join(" ");
}

// ─── Calc ──────────────────────────────────────────────────────────────────────
const ACTIVITY = {
  sedentary: { label: "Sedentary",          desc: "Desk job, no exercise", mult: 1.2   },
  light:     { label: "Lightly active",     desc: "1–3 days/week",         mult: 1.375 },
  moderate:  { label: "Moderately active",  desc: "3–5 days/week",         mult: 1.55  },
  active:    { label: "Very active",        desc: "6–7 days/week",         mult: 1.725 },
  athlete:   { label: "Athlete",            desc: "2× daily training",     mult: 1.9   },
};

const GOALS = {
  aggressive_cut: { label: "Aggressive Cut", cal: -700, proteinPerLb: 1.0, fatR: 0.35, carbR: 0.65 },
  cut:            { label: "Cut",            cal: -500, proteinPerLb: 1.0, fatR: 0.35, carbR: 0.65 },
  maintain:       { label: "Maintain",       cal:    0, proteinPerLb: 0.8, fatR: 0.35, carbR: 0.65 },
  lean_bulk:      { label: "Lean Bulk",      cal:  300, proteinPerLb: 0.85,fatR: 0.30, carbR: 0.70 },
  bulk:           { label: "Bulk",           cal:  500, proteinPerLb: 0.8, fatR: 0.28, carbR: 0.72 },
};

function calcTargets(f) {
  let w = +f.weight, h = +f.height, a = +f.age;
  if (!w || !h || !a) return null;
  if (f.unit === "imperial") { w *= 0.453592; h *= 2.54; }
  const bmr = f.sex === "male" ? 10*w + 6.25*h - 5*a + 5 : 10*w + 6.25*h - 5*a - 161;
  const tdee = Math.round(bmr * ACTIVITY[f.activity].mult);
  const g = GOALS[f.goal];
  const cal = Math.round(tdee + g.cal);
  const wLbs = f.unit === "imperial" ? +f.weight : w * 2.20462;
  const protein = Math.round(wLbs * g.proteinPerLb);
  const rem = cal - protein * 4;
  const fat = Math.round(rem * g.fatR / 9);
  const carbs = Math.round(rem * g.carbR / 4);
  const fiber = Math.round(cal / 1000 * 14);
  return { cal, protein, carbs, fat, fiber, tdee,
    pPct: Math.round(protein*4/cal*100),
    cPct: Math.round(carbs*4/cal*100),
    fPct: Math.round(fat*9/cal*100),
    water: Math.round(w * 0.033 * 10) / 10,
    proteinPerMeal: Math.round(protein / 5),
  };
}

.results-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:40px;padding-bottom:32px;border-bottom:1px solid #e8e4dc}
.results-cal{font-family:'DM Serif Display',serif;font-size:72px;color:#1a1a1a;line-height:1;letter-spacing:-3px}
.results-cal-sub{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#aaa;margin-top:6px}
.results-goal-badge{background:#1a1a1a;color:#e8d5a3;padding:6px 16px;border-radius:20px;font-size:11px;letter-spacing:2px;text-transform:uppercase}

.macro-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}
.macro-tile{background:#fff;border:1px solid #e8e4dc;border-radius:10px;padding:20px}
.macro-tile-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#bbb;margin-bottom:10px}
.macro-tile-val{font-family:'DM Serif Display',serif;font-size:32px;line-height:1;margin-bottom:2px}
.macro-tile-sub{font-size:10px;color:#bbb}
.mt-p .macro-tile-val{color:#c9a96e}
.mt-c .macro-tile-val{color:#6e9a84}
.mt-f .macro-tile-val{color:#9a6e9a}
.mt-fiber .macro-tile-val{color:#6e849a}

.macro-bar{display:flex;height:4px;border-radius:2px;gap:2px;margin-bottom:32px}
.mb-seg{border-radius:2px}

/* ── MEAL PLANNER ── */
.planner-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.planner-title{font-family:'DM Serif Display',serif;font-size:24px}
.quality-badges{display:flex;gap:6px;flex-wrap:wrap}
.quality-badge{font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:20px;background:#f0ead8;color:#9a7830;border:1px solid #e8d5a3}

.meal-slot{background:#fff;border:1px solid #e8e4dc;border-radius:12px;margin-bottom:12px;overflow:hidden}
.meal-slot-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #f0ece8;background:#faf9f7}
.meal-slot-name{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#aaa}
.meal-slot-cals{font-size:11px;color:#bbb}

.meal-opt{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;cursor:pointer;transition:background 0.1s;border-bottom:1px solid #f7f5f2}
.meal-opt:last-child{border-bottom:none}
.meal-opt:hover{background:#faf9f7}
.meal-opt.on{background:#fffdf5}

.meal-radio{width:14px;height:14px;border-radius:50%;border:2px solid #ddd;flex-shrink:0;margin-top:3px;transition:all 0.15s}
.meal-opt.on .meal-radio{border-color:#c9a84c;background:#c9a84c}

.meal-opt-body{flex:1;min-width:0}
.meal-opt-name{font-size:13px;color:#1a1a1a;margin-bottom:3px;font-weight:400}
.meal-opt-desc{font-size:11px;color:#aaa;line-height:1.5}
.meal-opt-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.meal-opt-tag{font-size:9px;padding:2px 8px;border-radius:10px;letter-spacing:0.5px}
.tag-organic{background:#eaf4ea;color:#4a7a4a}
.tag-grassfed{background:#f4f0ea;color:#7a6040}
.tag-pasture{background:#eaf0f4;color:#4a6070}
.tag-wildcaught{background:#eaf4f4;color:#3a7070}
.tag-nongmo{background:#f4eaf0;color:#703060}
.tag-usda{background:#f0f0f0;color:#888}

.meal-opt-usda{font-size:10px;color:#bbb;margin-top:4px;font-style:italic}
.meal-opt-macros{font-size:10px;color:#ccc;margin-top:4px}
.meal-opt-macros span{color:#aaa}

.usda-loading{font-size:10px;color:#ccc;font-style:italic;padding:12px 18px}

/* ── MICRO SCORECARD ── */
.micro-card{background:#fff;border:1px solid #e8e4dc;border-radius:12px;padding:24px;margin-top:24px}
.micro-card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.micro-card-title{font-family:'DM Serif Display',serif;font-size:20px}
.micro-card-badge{font-size:9px;letter-spacing:2px;text-transform:uppercase;background:#1a1a1a;color:#e8d5a3;padding:4px 12px;border-radius:20px}
.micro-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.micro-row{}
.micro-row-hdr{display:flex;justify-content:space-between;font-size:10px;color:#aaa;margin-bottom:5px;letter-spacing:0.5px}
.micro-row-hdr span{font-weight:500}
.micro-bar-bg{background:#f0ece8;border-radius:3px;height:4px;overflow:hidden}
.micro-bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
.micro-gate{margin-top:20px;padding:16px;background:#faf9f7;border-radius:8px;text-align:center;border:1px dashed #e8e4dc}
.micro-gate p{font-size:12px;color:#aaa;margin-bottom:12px;line-height:1.6}
.micro-gate-btn{background:#1a1a1a;color:#e8d5a3;border:none;padding:10px 24px;border-radius:6px;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif}

.insight-bar{background:#fffdf5;border:1px solid #f0e8cc;border-radius:10px;padding:16px 20px;margin-bottom:28px;font-size:12px;color:#8a7040;line-height:1.7}
.insight-bar strong{color:#5a4020}

.recalc-btn{font-size:11px;color:#aaa;background:none;border:1px solid #e8e4dc;border-radius:6px;padding:6px 14px;cursor:pointer;letter-spacing:1px;transition:all 0.15s}
.recalc-btn:hover{color:#1a1a1a;border-color:#1a1a1a}

.spinner-sm{display:inline-block;width:10px;height:10px;border:1.5px solid #ddd;border-top-color:#c9a84c;border-radius:50%;animation:spin 0.6s linear infinite;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

.ai-section{background:#fff;border:1px solid #e8e4dc;border-radius:12px;padding:24px;margin-top:24px}
.ai-section-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:6px}
.ai-section-sub{font-size:12px;color:#aaa;margin-bottom:20px}
.ai-generate-btn{width:100%;background:#f7f5f2;border:1.5px solid #e8e4dc;border-radius:8px;padding:14px;font-family:'Inter',sans-serif;font-size:13px;color:#555;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:10px}
.ai-generate-btn:hover{border-color:#c9a84c;color:#1a1a1a}
.ai-generate-btn:disabled{opacity:0.4;cursor:not-allowed}
.ai-output{margin-top:16px;font-size:12px;color:#555;line-height:1.9;white-space:pre-wrap;background:#faf9f7;border-radius:8px;padding:16px}

@media(max-width:640px){
  .macro-row{grid-template-columns:1fr 1fr}
  .results-cal{font-size:52px}
  .micro-grid{grid-template-columns:1fr}
  .results-header{flex-direction:column;gap:16px}
}
`;

// ─── Steps ─────────────────────────────────────────────────────────────────────
const STEPS = ["basics","activity","goal","preferences","store","results"];

function App() {
  const [step, setStep] = useState(0);
  const [form, setForm] = useState({
    age:"", weight:"", height:"", sex:"male", unit:"imperial",
    activity:"moderate", goal:"maintain",
    diet:"None", foodLikes:"", foodAvoid:"",
    qualities:{ organic:false, grassfed:false, pasture:false, wildcaught:false, nongmo:false },
    store:"none",
  });
  const [targets, setTargets] = useState(null);
  const [slots, setSlots] = useState([]);
  const [selected, setSelected] = useState({});
  const [usdaCache, setUsdaCache] = useState({});
  const [usdaLoading, setUsdaLoading] = useState(false);
  const [aiOutput, setAiOutput] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [aiDone, setAiDone] = useState(false);

  const set = (k,v) => setForm(f => ({...f,[k]:v}));
  const setQ = (k) => setForm(f => ({...f, qualities:{...f.qualities,[k]:!f.qualities[k]}}));

  const wl = form.unit==="imperial"?"lbs":"kg";
  const hl = form.unit==="imperial"?"in":"cm";
  const anyQuality = Object.values(form.qualities).some(Boolean);

  // Compute active quality tag labels
  const qualityLabels = {organic:"Organic",grassfed:"Grass-fed",pasture:"Pasture-raised",wildcaught:"Wild-caught",nongmo:"Non-GMO"};
  const activeQualityTags = Object.entries(form.qualities).filter(([,v])=>v).map(([k])=>k);

  function goNext() {
    // Step 4 is the last step before results (store selection)
    if (step === 4) {
      const t = calcTargets(form);
      if (!t) return;
      setTargets(t);
      const tmpl = getTemplates(form.goal);
      setSlots(tmpl);
      const defaults = {};
      tmpl.forEach((_,i) => { defaults[i] = 0; });
      setSelected(defaults);
      loadUSDA(tmpl);
      setStep(5);
      return;
    }
    if (step < 5) {
      setStep(s => s+1);
    }
  }

  async function loadUSDA(tmpl) {
    setUsdaLoading(true);
    const cache = {};
    for (const slot of tmpl) {
      for (const opt of slot.options) {
        const q = buildSearchQuery(opt.search, form.qualities, form.store);
        if (!cache[q]) {
          const results = await searchUSDA(q);
          cache[q] = results;
        }
      }
    }
    setUsdaCache(cache);
    setUsdaLoading(false);
  }

  function getUSDAForOpt(opt) {
    const q = buildSearchQuery(opt.search, form.qualities, form.store);
    return usdaCache[q] || [];
  }

  function getSlotCals(slotIdx) {
    if (!targets) return 0;
    return Math.round(targets.cal * slots[slotIdx].pct);
  }

  // Micronutrient score from selected meals
  const microScore = (() => {
    const totals = Object.fromEntries(Object.keys(MICRO_LABELS).map(k=>[k,0]));
    slots.forEach((slot,i) => {
      const optName = slot.options[selected[i]??0]?.name;
      const profile = MICRO_DATA[optName];
      if (profile) Object.keys(totals).forEach(k => { totals[k] += profile[k]||0; });
    });
    return totals;
  })();

  async function generateAI() {
    if (!targets) return;
    setAiLoading(true); setAiOutput(""); setAiDone(false);
    const dietNote = form.diet!=="None"?`Diet: ${form.diet}.`:"";
    const likesNote = form.foodLikes?`Enjoys: ${form.foodLikes}.`:"";
    const avoidNote = form.foodAvoid?`Avoids: ${form.foodAvoid}.`:"";
    const qualNote = anyQuality ? `Quality preferences: ${activeQualityTags.map(k=>qualityLabels[k]).join(", ")}.` : "";
    const storeNote = form.store && form.store !== "none" ? `The person shops at ${GROCERY_STORES[form.store].label} — prioritize ${GROCERY_STORES[form.store].brand} brand products and brands available at that store.` : "";
    const prompt = `You are a registered dietitian. Build a precise one-day meal plan.
Targets: ${targets.cal} kcal | ${targets.protein}g protein | ${targets.carbs}g carbs | ${targets.fat}g fat | ${targets.fiber}g fiber
Goal: ${GOALS[form.goal].label}. ${dietNote} ${likesNote} ${avoidNote} ${qualNote}
Protein ~${targets.proteinPerMeal}g per meal. 5 meals.
For each meal: name, exact ingredients with weights/portions, calories, P/C/F macros.
Include specific brand names where relevant${anyQuality?" that match quality preferences":""}${form.store !== "none"?` available at ${GROCERY_STORES[form.store].label}`:""}. ${storeNote}
End with Day Total. Plain text, no markdown or asterisks.`;
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,stream:true,messages:[{role:"user",content:prompt}]})
      });
      const reader = resp.body.getReader();
      const dec = new TextDecoder();
      let buf = "";
      while(true){
        const {done,value} = await reader.read();
        if(done) break;
        buf += dec.decode(value,{stream:true});
        const lines = buf.split("\n"); buf = lines.pop();
        for(const line of lines){
          if(line.startsWith("data: ")){
            try{ const d=JSON.parse(line.slice(6)); if(d.type==="content_block_delta"&&d.delta?.text) setAiOutput(p=>p+d.delta.text); }catch{}
          }
        }
      }
      setAiDone(true);
    } catch{ setAiOutput("Error generating. Please try again."); }
    finally{ setAiLoading(false); }
  }

  const canNext = {
    0: form.age && form.weight && form.height,
    1: true,
    2: true,
    3: true,
    4: true,
    5: true,
  };

  // ── Step renders ──────────────────────────────────────────────────────────────
  function renderStep() {
    if (step === 0) return (
      <>
        <h1 className="step-title">Let's build your plan.</h1>
        <p className="step-sub">A few quick details and Fuel calculates exactly how much you should eat — no guesswork.</p>

        <div className="chip-row">
          {["imperial","metric"].map(u=>(
            <div key={u} className={`chip ${form.unit===u?"on":""}`} onClick={()=>set("unit",u)}>
              {u==="imperial"?"lbs / inches":"kg / cm"}
            </div>
          ))}
        </div>

        <div className="chip-row">
          {["male","female"].map(s=>(
            <div key={s} className={`chip ${form.sex===s?"on":""}`} onClick={()=>set("sex",s)}>
              {s[0].toUpperCase()+s.slice(1)}
            </div>
          ))}
        </div>

        <div className="field">
          <label>Age</label>
          <input type="number" placeholder="28" value={form.age} onChange={e=>set("age",e.target.value)} />
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div className="field">
            <label>Weight ({wl})</label>
            <input type="number" placeholder={form.unit==="imperial"?"185":"84"} value={form.weight} onChange={e=>set("weight",e.target.value)} />
          </div>
          <div className="field">
            <label>Height ({hl})</label>
            <input type="number" placeholder={form.unit==="imperial"?"70":"178"} value={form.height} onChange={e=>set("height",e.target.value)} />
          </div>
        </div>
      </>
    );

    if (step === 1) return (
      <>
        <h1 className="step-title">How active are you?</h1>
        <p className="step-sub">Be honest — this is the single biggest variable in your calorie target. Most people overestimate.</p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {Object.entries(ACTIVITY).map(([k,v])=>(
            <div key={k} onClick={()=>set("activity",k)} style={{
              padding:"16px 20px", borderRadius:10, border:`1.5px solid ${form.activity===k?"#1a1a1a":"#e8e4dc"}`,
              background:form.activity===k?"#1a1a1a":"#fff", cursor:"pointer", transition:"all 0.15s"
            }}>
              <div style={{fontSize:14,color:form.activity===k?"#f7f5f2":"#1a1a1a",marginBottom:3}}>{v.label}</div>
              <div style={{fontSize:12,color:form.activity===k?"#888":"#aaa"}}>{v.desc}</div>
            </div>
          ))}
        </div>
      </>
    );

    if (step === 2) return (
      <>
        <h1 className="step-title">What's your goal?</h1>
        <p className="step-sub">Your goal sets the calorie adjustment and macro split. You can change this anytime.</p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {Object.entries(GOALS).map(([k,v])=>(
            <div key={k} onClick={()=>set("goal",k)} style={{
              padding:"16px 20px", borderRadius:10, border:`1.5px solid ${form.goal===k?"#c9a84c":"#e8e4dc"}`,
              background:form.goal===k?"#fffdf5":"#fff", cursor:"pointer", transition:"all 0.15s",
              display:"flex", justifyContent:"space-between", alignItems:"center"
            }}>
              <div style={{fontSize:14,color:"#1a1a1a"}}>{v.label}</div>
              <div style={{fontSize:11,color:form.goal===k?"#c9a84c":"#bbb"}}>
                {v.cal>0?"+":""}{v.cal!==0?v.cal+" kcal":"At TDEE"}
              </div>
            </div>
          ))}
        </div>
      </>
    );

    if (step === 4) return ( // grocery store step
      <>
        <h1 className="step-title">Where do you shop?</h1>
        <p className="step-sub">Fuel will filter meal recommendations to show brands you can actually find at your store. Optional but makes your plan immediately shoppable.</p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {Object.entries(GROCERY_STORES).map(([k,v])=>(
            <div key={k} onClick={()=>set("store",k)} style={{
              padding:"14px 20px", borderRadius:10, border:`1.5px solid ${form.store===k?"#c9a84c":"#e8e4dc"}`,
              background:form.store===k?"#fffdf5":"#fff", cursor:"pointer", transition:"all 0.15s",
              display:"flex", justifyContent:"space-between", alignItems:"center"
            }}>
              <div style={{fontSize:14,color:"#1a1a1a"}}>{v.label}</div>
              {v.brand && <div style={{fontSize:11,color:form.store===k?"#c9a84c":"#bbb",fontStyle:"italic"}}>{v.brand.split(" ").filter(w=>w.length>0).map(w=>w[0].toUpperCase()+w.slice(1)).join(" ")}</div>}
            </div>
          ))}
        </div>
      </>
    );

    if (step === 3) return (
      <>
        <h1 className="step-title">Preferences & quality.</h1>
        <p className="step-sub">Tell Fuel what you eat, what you avoid, and your food quality standards. All optional.</p>

        <div className="field" style={{marginBottom:8}}>
          <label>Dietary preference</label>
          <div className="chip-row" style={{marginBottom:0}}>
            {["None","Vegetarian","Vegan","Pescatarian","Keto","Paleo","Gluten-Free","Dairy-Free","Halal","Kosher"].map(d=>(
              <div key={d} className={`chip ${form.diet===d?"on":""}`} onClick={()=>set("diet",d)} style={{fontSize:12,padding:"7px 14px"}}>{d}</div>
            ))}
          </div>
        </div>

        <div className="field">
          <label>Foods I enjoy</label>
          <input type="text" placeholder="e.g. chicken thighs, eggs, greek yogurt, sweet potatoes" value={form.foodLikes} onChange={e=>set("foodLikes",e.target.value)} />
        </div>

        <div className="field" style={{marginBottom:28}}>
          <label>Foods I avoid</label>
          <input type="text" placeholder="e.g. fish, broccoli, anything spicy" value={form.foodAvoid} onChange={e=>set("foodAvoid",e.target.value)} />
        </div>

        <div style={{fontSize:11,letterSpacing:"1px",color:"#999",textTransform:"uppercase",marginBottom:12}}>Food Quality Standards</div>
        <p style={{fontSize:12,color:"#aaa",marginBottom:16,lineHeight:1.6}}>
          Select your standards and Fuel will filter meal options and AI recommendations to match — including specific brands.
        </p>
        <div className="chip-row">
          {[["organic","🌿 Organic"],["grassfed","🐄 Grass-fed"],["pasture","🥚 Pasture-raised"],["wildcaught","🐟 Wild-caught"],["nongmo","✓ Non-GMO"]].map(([k,l])=>(
            <div key={k} className={`chip gold ${form.qualities[k]?"on":""}`} onClick={()=>setQ(k)} style={{fontSize:12}}>{l}</div>
          ))}
        </div>
      </>
    );
  }

  // ── Results view ──────────────────────────────────────────────────────────────
  if (step === 5 && targets) return (
    <>
      <style>{S}</style>
      <div className="app">
        <div className="results-wrap">
          {/* Header */}
          <div className="results-header">
            <div>
              <div className="results-cal">{targets.cal.toLocaleString()}</div>
              <div className="results-cal-sub">calories per day</div>
            </div>
            <div style={{textAlign:"right",display:"flex",flexDirection:"column",gap:10,alignItems:"flex-end"}}>
              <div className="results-goal-badge">{GOALS[form.goal].label}</div>
              <div style={{fontSize:11,color:"#bbb"}}>TDEE {targets.tdee.toLocaleString()} kcal</div>
              <button className="recalc-btn" onClick={()=>setStep(0)}>← Recalculate</button>
            </div>
          </div>

          {/* Macro bar */}
          <div className="macro-bar" style={{marginBottom:16}}>
            <div className="mb-seg" style={{width:`${targets.pPct}%`,background:"#c9a96e"}} />
            <div className="mb-seg" style={{width:`${targets.cPct}%`,background:"#6e9a84"}} />
            <div className="mb-seg" style={{width:`${targets.fPct}%`,background:"#9a6e9a"}} />
          </div>

          {/* Macro tiles */}
          <div className="macro-row">
            <div className="macro-tile mt-p">
              <div className="macro-tile-label">Protein</div>
              <div className="macro-tile-val">{targets.protein}g</div>
              <div className="macro-tile-sub">{targets.pPct}% · 1g/lb bodyweight</div>
            </div>
            <div className="macro-tile mt-c">
              <div className="macro-tile-label">Carbs</div>
              <div className="macro-tile-val">{targets.carbs}g</div>
              <div className="macro-tile-sub">{targets.cPct}% of calories</div>
            </div>
            <div className="macro-tile mt-f">
              <div className="macro-tile-label">Fat</div>
              <div className="macro-tile-val">{targets.fat}g</div>
              <div className="macro-tile-sub">{targets.fPct}% of calories</div>
            </div>
            <div className="macro-tile mt-fiber">
              <div className="macro-tile-label">Fiber</div>
              <div className="macro-tile-val">{targets.fiber}g</div>
              <div className="macro-tile-sub">14g per 1,000 kcal</div>
            </div>
          </div>

          {/* Insight */}
          <div className="insight-bar">
            <strong>How we calculated this:</strong> Your BMR is {Math.round(targets.tdee / ACTIVITY[form.activity].mult).toLocaleString()} kcal.
            With your {ACTIVITY[form.activity].label.toLowerCase()} activity level, your TDEE is {targets.tdee.toLocaleString()} kcal.
            Your {GOALS[form.goal].label.toLowerCase()} goal {GOALS[form.goal].cal!==0?`adjusts by ${GOALS[form.goal].cal>0?"+":""}${GOALS[form.goal].cal} kcal`:"keeps you at TDEE"} — landing at <strong>{targets.cal.toLocaleString()} kcal/day</strong>.
            Protein is set at 1g/lb bodyweight — the method sports dietitians actually use, not a generic percentage.
            Aim for ~<strong>{targets.proteinPerMeal}g protein per meal</strong> across 5 meals to maximize muscle protein synthesis.
            {form.diet!=="None" && ` Filtered for ${form.diet} dietary preference.`}
            {anyQuality && ` Quality filters active: ${activeQualityTags.map(k=>qualityLabels[k]).join(", ")}.`}
            {form.store && form.store !== "none" && ` Shopping at ${GROCERY_STORES[form.store].label} — showing ${GROCERY_STORES[form.store].brand?.split(" ").map(w=>w[0].toUpperCase()+w.slice(1)).join(" ")} and available brands.`}
          </div>

          {/* Meal Planner */}
          <div className="planner-header">
            <div className="planner-title">Your Meal Plan</div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
              {usdaLoading && <div style={{fontSize:11,color:"#aaa"}}><span className="spinner-sm"/>Loading real food data...</div>}
              {form.store && form.store !== "none" && (
                <div style={{fontSize:11,color:"#c9a84c",letterSpacing:1}}>
                  🛒 {GROCERY_STORES[form.store].label} · {GROCERY_STORES[form.store].brand?.split(" ").map(w=>w[0].toUpperCase()+w.slice(1)).join(" ")}
                </div>
              )}
              {anyQuality && (
                <div className="quality-badges">
                  {activeQualityTags.map(k=>(
                    <div key={k} className="quality-badge">{qualityLabels[k]}</div>
                  ))}
                </div>
              )}
            </div>
          </div>
          <p style={{fontSize:12,color:"#aaa",marginBottom:20,lineHeight:1.6}}>
            Pick your preferred option for each meal. Options are scaled to hit your calorie targets.
            {anyQuality && " Filtered for your quality standards with real product matches from the USDA database."}
          </p>

          {slots.map((slot, si) => {
            const chosen = selected[si] ?? 0;
            const slotCals = getSlotCals(si);
            return (
              <div key={si} className="meal-slot">
                <div className="meal-slot-hdr">
                  <div className="meal-slot-name">{slot.slot}</div>
                  <div className="meal-slot-cals">~{slotCals} kcal</div>
                </div>
                {slot.options.map((opt, oi) => {
                  const usdaHits = getUSDAForOpt(opt);
                  const topHit = usdaHits[0];
                  const tags = activeQualityTags;
                  return (
                    <div key={oi} className={`meal-opt ${chosen===oi?"on":""}`} onClick={()=>setSelected(p=>({...p,[si]:oi}))}>
                      <div className="meal-radio" />
                      <div className="meal-opt-body">
                        <div className="meal-opt-name">{opt.name}</div>
                        <div className="meal-opt-desc">{opt.desc}</div>
                        {tags.length > 0 && (
                          <div className="meal-opt-tags">
                            {tags.map(t => (
                              <span key={t} className={`meal-opt-tag tag-${t}`}>{qualityLabels[t]}</span>
                            ))}
                          </div>
                        )}
                        {topHit && topHit.brand && (
                          <div className="meal-opt-usda">
                            ↗ <strong style={{color:"#888"}}>{topHit.brand}</strong> — {topHit.name} · {topHit.serving} · {topHit.kcal} kcal · {topHit.protein}g protein
                          </div>
                        )}
                        {topHit && !topHit.brand && (
                          <div className="meal-opt-usda">
                            ↗ {topHit.name} · {topHit.serving} · {topHit.kcal} kcal · {topHit.protein}g protein
                          </div>
                        )}
                        {!topHit && usdaLoading && (
                          <div className="meal-opt-usda"><span className="spinner-sm"/>Finding products...</div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}

          {/* Micronutrient Scorecard */}
          <div className="micro-card">
            <div className="micro-card-hdr">
              <div className="micro-card-title">Micronutrient Scorecard</div>
              <div className="micro-card-badge">Live · updates as you swap</div>
            </div>
            <div className="micro-grid">
              {Object.entries(MICRO_LABELS).map(([k,label]) => {
                const pct = Math.min(microScore[k]||0, 100);
                const color = pct>=80?"#6e9a84":pct>=50?"#c9a84c":"#c97a6e";
                return (
                  <div key={k} className="micro-row">
                    <div className="micro-row-hdr">{label}<span>{pct}% DV</span></div>
                    <div className="micro-bar-bg">
                      <div className="micro-bar-fill" style={{width:`${pct}%`,background:color}} />
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="micro-gate">
              <p>🔒 Pro shows exact mg/mcg amounts, flags deficiencies, suggests specific food swaps to hit 100% of every nutrient, and generates a full weekly micronutrient report.</p>
              <button className="micro-gate-btn">Upgrade to Pro — $7.99/mo</button>
            </div>
          </div>

          {/* AI Generator */}
          <div className="ai-section">
            <div className="ai-section-title">AI Meal Generator</div>
            <div className="ai-section-sub">
              Generate a fully personalized day of eating using real branded foods
              {anyQuality ? ` filtered for ${activeQualityTags.map(k=>qualityLabels[k]).join(", ")}` : ""}.
            </div>
            <button className="ai-generate-btn" onClick={generateAI} disabled={aiLoading}>
              {aiLoading ? <><span className="spinner-sm"/>Generating your personalized plan...</> : aiDone ? "✦ Generate another" : "✦ Generate personalized meal day"}
            </button>
            {aiOutput && <div className="ai-output">{aiOutput}</div>}
          </div>

        </div>
      </div>
    </>
  );

  // ── Step flow ─────────────────────────────────────────────────────────────────
  return (
    <>
      <style>{S}</style>
      <div className="app">
        <div className="step-wrap">
          <div className="step-logo">Fu<span>e</span>l</div>
          <div className="step-eyebrow">Precision nutrition planning</div>

          <div className="progress">
            {STEPS.slice(0,-1).map((_,i)=>(
              <div key={i} className={`progress-dot ${i<=step?"done":""}`} />
            ))}
          </div>

          {step > 0 && (
            <button className="btn-back" onClick={()=>setStep(s=>s-1)}>← Back</button>
          )}

          {renderStep()}

          <button className="btn-primary" onClick={goNext} disabled={!canNext[step]}>
            {step === 5 ? "Build my plan →" : "Continue →"}
          </button>
        </div>
      </div>
    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
