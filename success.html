<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fuel — You're on the list!</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Karla:wght@300;400&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #3d5a40; color: #f5f0e8;
    font-family: 'Karla', sans-serif; font-weight: 300;

  }
  .icon { font-size: 48px; margin-bottom: 24px; }
  h1 { font-family: 'Playfair Display', serif; font-size: 48px; letter-spacing: -1.5px; margin-bottom: 16px; line-height: 1.1; }
  p { font-size: 16px; color: rgba(245,240,232,0.6); line-height: 1.7; max-width: 400px; margin: 0 auto 40px; }
  a {
    display: inline-block; background: #c9a84c; color: #111;
    padding: 14px 36px; border-radius: 2px; text-decoration: none;
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500;
  }
  a:hover { background: #e8d5a3; }

<body>
  <div>
    <div class="icon">✦</div>
